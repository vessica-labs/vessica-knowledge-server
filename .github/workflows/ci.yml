name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: knowledge
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d knowledge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_POSTGRES_URL: postgres://postgres:test@127.0.0.1:5432/knowledge?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.x" }
      - run: go test ./...
      - run: go vet ./...
  image:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v6
        with: { context: ., push: true, tags: "ghcr.io/vessica-labs/vessica-knowledge-server:${{ github.ref_name }}" }
